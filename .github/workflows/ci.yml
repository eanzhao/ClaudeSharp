name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Aexon.slnx

      - name: Build
        run: dotnet build Aexon.slnx --configuration Release --no-restore

      - name: Test With Coverage Gate
        run: >
          dotnet test tests/Aexon.Core.Tests/Aexon.Core.Tests.csproj
          --configuration Release
          --no-restore
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=json
          /p:CoverletOutput=TestResults/coverage-ci/
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total
