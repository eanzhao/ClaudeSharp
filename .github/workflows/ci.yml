name: ci

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Aexon.slnx

      - name: Scan vulnerable packages
        shell: bash
        run: |
          set -o pipefail
          output_file=vulnerability-report.txt
          dotnet list Aexon.slnx package --vulnerable --include-transitive | tee "$output_file"
          if grep -Fq "has the following vulnerable packages" "$output_file"; then
            exit 1
          fi

      - name: Build
        run: dotnet build Aexon.slnx --configuration Release --no-restore

      - name: Check formatting
        run: dotnet format Aexon.slnx --verify-no-changes --no-restore --verbosity diagnostic --severity error

      - name: Test With Coverage Gate
        shell: bash
        run: |
          dotnet test Aexon.slnx \
            --configuration Release \
            --no-restore \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=json \
            /p:CoverletOutput=TestResults/coverage-ci/ \
            /p:Threshold=80 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            '/p:Exclude=[Aexon.Cli]*'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: tests/**/TestResults/coverage-ci/
          if-no-files-found: warn
