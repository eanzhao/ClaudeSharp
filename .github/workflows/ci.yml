name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ClaudeSharp.slnx

      - name: Build
        run: dotnet build ClaudeSharp.slnx --configuration Release --no-restore

      - name: Test With Coverage Gate
        run: >
          dotnet test ClaudeSharp.slnx
          --configuration Release
          --no-restore
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=json
          /p:CoverletOutput=TestResults/coverage-ci/
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=total
